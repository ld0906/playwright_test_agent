# 每日 02:00 跑一次完整测试 + 检测 RISK 基线变化
# 不在这里跑 Healer——Healer 必须有人 review
#
# 这份 workflow 的核心价值：
# 1. 不依赖 PR 触发，每天兜底跑
# 2. 检测 RISK-* 用例如果"突然通过"，说明 bug 修了，需要人去掉 test.fail()
# 3. 检测 spec 数量、断言数量趋势，作为团队 KPI

name: Playwright Nightly

on:
  schedule:
    - cron: '0 18 * * *'    # UTC 18:00 = 北京时间 02:00
  workflow_dispatch:

permissions:
  contents: read
  issues: write          # Notify 步骤要建 issue，默认 token 可能只读

jobs:
  full-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: tests-agents

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tests-agents/package-lock.json

      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Start demo-app
        run: |
          cd ../demo-app
          npm run dev &
          npx wait-on http://localhost:5173 -t 30000

      - name: Run all tests (JSON reporter)
        # --reporter=json 默认写 stdout；要落地成文件必须用 PLAYWRIGHT_JSON_OUTPUT_NAME。
        # （旧写法 --output=results.json 实际是 artifacts 目录，不会生成报告文件。）
        run: npx playwright test --reporter=json
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: results.json
        continue-on-error: true

      - name: Diff against baseline
        # baseline.json 在 ep08 目录，不在 tests-agents，需用相对路径指过去。
        run: node ../ep08-ci-and-boundaries/code/scripts/diff-baseline.js results.json ../ep08-ci-and-boundaries/code/baseline.json

      - name: Notify if RISK-* unexpectedly passed
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ RISK 用例状态变化，请人工 review',
              body: '某条标记 test.fail() 的用例突然通过，说明对应 bug 可能已被修复。请去掉 test.fail() 让它进入正式回归。'
            });
