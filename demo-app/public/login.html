<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>登录 - 迷你书店</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="auth-wrap">
    <h1>迷你书店</h1>
    <form id="login-form" class="card" aria-label="登录表单">
      <h2>登录</h2>
      <label>
        用户名
        <input type="text" name="username" required aria-label="用户名">
      </label>
      <label>
        密码
        <input type="password" name="password" required aria-label="密码">
      </label>
      <button type="submit">登录</button>
      <p id="login-error" class="error" role="alert" hidden></p>
      <p class="hint">测试账号：alice / password</p>
    </form>
  </main>
  <script src="/app.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const u = fd.get('username');
      const p = fd.get('password');
      if (u === 'alice' && p === 'password') {
        localStorage.setItem('user', u);
        location.href = '/books.html';
      } else {
        const err = document.getElementById('login-error');
        err.textContent = '用户名或密码错误';
        err.hidden = false;
      }
    });
  </script>
</body>
</html>
