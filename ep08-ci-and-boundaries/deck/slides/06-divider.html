<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><title>EP 08 · 分界</title><link rel="stylesheet" href="../shared/tokens.css">
<style>
  .divider-page { width:1920px; height:1080px; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:128px; position:relative;
    background: radial-gradient(ellipse at center, rgba(251,191,36,0.12), transparent 60%), var(--bg); }
  .label { font-family:var(--font-mono); font-size:18px; color:var(--accent-warm); letter-spacing:0.2em; margin-bottom:48px; padding:8px 20px; background:rgba(251,191,36,0.12); border:1px solid rgba(251,191,36,0.3); border-radius:999px; }
  .quote-big { font-size:88px; font-weight:700; line-height:1.2; color:var(--ink-1); text-align:center; letter-spacing:-0.01em; max-width:1400px; }
  .quote-big .em-line { display:block; }
  .quote-big .punch { color:var(--accent-warm); }
  .hint { margin-top:64px; font-size:24px; color:var(--ink-3); text-align:center; max-width:900px; line-height:1.5; }
  .corner { position:absolute; bottom:60px; left:50%; transform:translateX(-50%); font-family:var(--font-mono); font-size:14px; color:var(--ink-4); letter-spacing:0.2em; }
</style></head>
<body>
<div class="divider-page">
  <div class="label">DOWN HALF · 下半场</div>
  <div class="quote-big">
    <span class="em-line">会用工具是<span class="punch">入门</span>。</span>
    <span class="em-line">知道什么时候<span class="punch">不用</span>，是<span class="punch">工程化</span>。</span>
  </div>
  <div class="hint">接下来 3 张 PPT 全在讲"不要用" ——<br>听完你会带走这门课最重要的产物：<strong style="color:var(--ink-1);">拒绝不合适场景的判断力</strong>。</div>
  <div class="corner">EP 08 · 06 / 09</div>
</div>
</body>
</html>
